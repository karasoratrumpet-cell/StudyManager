        function playAlarmSound() {
            if (!state.settings.soundOn) return;
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const playTone = (freq, start, duration) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, start);
                gain.gain.setValueAtTime(1.0, start); 
                gain.gain.exponentialRampToValueAtTime(0.00001, start + duration);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(start); osc.stop(start + duration);
            };
            playTone(523.25, audioCtx.currentTime, 0.3);
            playTone(659.25, audioCtx.currentTime + 0.15, 0.4);
        }

        function getLocalDateString(dateObj = new Date()) {
            const year = dateObj.getFullYear();
            const month = String(dateObj.getMonth() + 1).padStart(2, '0');
            const day = String(dateObj.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        const todayInit = getLocalDateString();
        todoDate.value = todayInit; todoEndDate.value = todayInit;
        
        todoDate.addEventListener('change', () => {

            const now = Date.now();
