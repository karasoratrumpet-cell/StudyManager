<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポモドーロ ＆ TODOタスクマネージャー</title>
    <!-- Tailwind CSS for UI styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- FullCalendar CSS & JS -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <style>
        .fc-theme-standard td, .fc-theme-standard th { border-color: #e5e7eb; }
        .fc .fc-button-primary { background-color: #3b82f6; border-color: #3b82f6; }
        .fc .fc-button-primary:hover { background-color: #2563eb; border-color: #2563eb; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <!-- ナビゲーションバー -->
    <nav class="bg-white shadow-sm border-b border-gray-200 px-6 py-3 flex justify-between items-center">
        <h1 class="text-xl font-bold text-indigo-600 flex items-center gap-2">
            <i class="fa-solid fa-graduation-cap"></i> StudyDesk
        </h1>
        <div id="auth-section">
            <button id="btn-login" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2 transition">
                <i class="fa-brands fa-google"></i> Googleログイン
            </button>
            <div id="user-profile" class="hidden flex items-center gap-3">
                <img id="user-avatar" class="w-8 h-8 rounded-full border" src="" alt="User Avatar">
                <span id="user-name" class="text-sm font-medium text-gray-700"></span>
                <button id="btn-logout" class="text-gray-500 hover:text-red-600 text-sm font-medium transition">ログアウト</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 lg:p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <!-- 左カラム: ポモドーロタイマー & 毎日続ける進捗 -->
        <div class="space-y-6">
            <!-- ポモドーロタイマー -->
            <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 text-center">
                <div class="flex justify-between items-center mb-4">
                    <span id="timer-status" class="text-xs font-bold uppercase tracking-wider bg-red-100 text-red-700 px-3 py-1 rounded-full">
                        集中時間 (25分)
                    </span>
                    <button id="btn-sound-toggle" class="text-gray-500 hover:text-indigo-600 transition text-lg">
                        <i id="sound-icon" class="fa-solid fa-volume-high"></i>
                    </button>
                </div>
                
                <div id="timer-display" class="text-6xl font-mono font-bold text-gray-900 my-6">25:00</div>
                
                <div class="flex justify-center gap-3">
                    <button id="btn-timer-start" class="bg-red-500 hover:bg-red-600 text-white font-medium px-6 py-2.5 rounded-xl transition flex items-center gap-2 w-28 justify-center">
                        <i class="fa-solid fa-play"></i> スタート
                    </button>
                    <button id="btn-timer-pause" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium px-6 py-2.5 rounded-xl transition flex items-center gap-2 w-28 justify-center hidden">
                        <i class="fa-solid fa-pause"></i> 一時停止
                    </button>
                    <button id="btn-timer-reset" class="bg-gray-100 hover:bg-gray-200 text-gray-500 font-medium px-4 py-2.5 rounded-xl transition">
                        リセット
                    </button>
                </div>
            </div>

            <!-- 毎日の進捗 (習慣・統計) -->
            <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6">
                <h3 class="font-bold text-gray-900 mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-fire text-orange-500"></i> 本日の進捗
                </h3>
                <div class="space-y-4">
                    <div>
                        <div class="flex justify-between text-sm mb-1">
                            <span class="text-gray-500">タスク完了率</span>
                            <span id="progress-percent" class="font-semibold text-indigo-600">0%</span>
                        </div>
                        <div class="w-full bg-gray-100 h-2.5 rounded-full overflow-hidden">
                            <div id="progress-bar" class="bg-indigo-600 h-full transition-all duration-500物" style="width: 0%"></div>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3 pt-2">
                        <div class="bg-gray-50 p-3 rounded-xl border border-gray-100">
                            <div class="text-xs text-gray-400 font-medium">完了タスク</div>
                            <div id="stat-completed" class="text-xl font-bold text-gray-800 mt-1">0</div>
                        </div>
                        <div class="bg-gray-50 p-3 rounded-xl border border-gray-100">
                            <div class="text-xs text-gray-400 font-medium">総ポモドーロ</div>
                            <div id="stat-pomodoros" class="text-xl font-bold text-gray-800 mt-1">0</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 中央カラム: TODOリスト (5段階コスト付き) -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 flex flex-col h-[calc(100vh-120px)] min-h-[550px]">
            <h3 class="font-bold text-gray-900 mb-4 flex items-center gap-2">
                <i class="fa-solid fa-list-check text-indigo-500"></i> TODOリスト
            </h3>
            
            <!-- タスク追加フォーム -->
            <form id="todo-form" class="space-y-3 mb-4">
                <input type="text" id="todo-input" placeholder="新しいタスクを入力..." required
                    class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                
                <div class="flex gap-2 items-center justify-between">
                    <div class="flex items-center gap-1.5">
                        <span class="text-xs text-gray-500 font-medium">コスト:</span>
                        <div class="flex gap-0.5" id="cost-selector">
                            <!-- 1〜5のコストボタン -->
                            <button type="button" data-cost="1" class="cost-star text-amber-400 text-sm"><i class="fa-solid fa-star"></i></button>
                            <button type="button" data-cost="2" class="cost-star text-gray-300 text-sm"><i class="fa-solid fa-star"></i></button>
                            <button type="button" data-cost="3" class="cost-star text-gray-300 text-sm"><i class="fa-solid fa-star"></i></button>
                            <button type="button" data-cost="4" class="cost-star text-gray-300 text-sm"><i class="fa-solid fa-star"></i></button>
                            <button type="button" data-cost="5" class="cost-star text-gray-300 text-sm"><i class="fa-solid fa-star"></i></button>
                        </div>
                    </div>
                    <input type="date" id="todo-date" required class="text-xs border border-gray-200 p-1.5 rounded-lg text-gray-600 focus:outline-none focus:ring-1 focus:ring-indigo-500">
                    <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-semibold px-4 py-2 rounded-xl transition shrink-0">
                        追加
                    </button>
                </div>
            </form>

            <!-- タスク一覧 (スクロール可能) -->
            <div id="todo-list" class="flex-1 overflow-y-auto space-y-2 pr-1">
                <!-- 動的に生成されます -->
                <p class="text-center text-gray-400 text-xs py-8">タスクがありません</p>
            </div>
        </div>

        <!-- 右カラム: カレンダー機能 -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-4 lg:p-6 flex flex-col h-[calc(100vh-120px)] min-h-[550px]">
            <h3 class="font-bold text-gray-900 mb-3 flex items-center gap-2">
                <i class="fa-regular fa-calendar-days text-emerald-500"></i> スケジュールカレンダー
            </h3>
            <div id="calendar" class="text-xs flex-1"></div>
        </div>

    </main>

    <!-- Firebase SDKの読み込み (Modular形式) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // --- 1. Firebaseの設定設定 ---
        // GitHub公開時はここにあなたのFirebaseプロジェクトの認証情報を貼り付けます。
        // 未設定時は自動的にブラウザのLocalStorageに保存するフォールバック機能が付いています。
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Firebaseの初期化チェック
        let app, auth, db, provider;
        let isFirebaseActive = false;

        if (firebaseConfig.apiKey !== "YOUR_API_KEY") {
            try {
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                provider = new GoogleAuthProvider();
                isFirebaseActive = true;
            } catch (e) {
                console.error("Firebaseの初期化に失敗しました。ローカルモードで動作します。", e);
            }
        }

        // --- 2. アプリケーションの状態管理 (State) ---
        let state = {
            user: null,
            todos: [],
            pomodoroCount: 0,
            settings: {
                soundOn: true,
                currentCost: 1
            },
            timer: {
                minutes: 25,
                seconds: 0,
                isBreak: false,
                isRunning: false,
                intervalId: null
            }
        };

        // Web Audio API を使ったアラーム音の生成（外部ファイル不要）
        function playAlarmSound() {
            if (!state.settings.soundOn) return;
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // 綺麗な2音のチャイム音を合成
            const playTone = (freq, start, duration) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, start);
                gain.gain.setValueAtTime(0.3, start);
                gain.gain.exponentialRampToValueAtTime(0.00001, start + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(start);
                osc.stop(start + duration);
            };
            
            playTone(523.25, audioCtx.currentTime, 0.3); // C5
            playTone(659.25, audioCtx.currentTime + 0.15, 0.4); // E5
        }

        // --- 3. UI要素の取得 ---
        const timerDisplay = document.getElementById('timer-display');
        const timerStatus = document.getElementById('timer-status');
        const btnTimerStart = document.getElementById('btn-timer-start');
        const btnTimerPause = document.getElementById('btn-timer-pause');
        const btnTimerReset = document.getElementById('btn-timer-reset');
        const btnSoundToggle = document.getElementById('btn-sound-toggle');
        const soundIcon = document.getElementById('sound-icon');
        
        const todoForm = document.getElementById('todo-form');
        const todoInput = document.getElementById('todo-input');
        const todoDate = document.getElementById('todo-date');
        const todoList = document.getElementById('todo-list');
        const costSelector = document.getElementById('cost-selector');
        
        const progressBar = document.getElementById('progress-bar');
        const progressPercent = document.getElementById('progress-percent');
        const statCompleted = document.getElementById('stat-completed');
        const statPomodoros = document.getElementById('stat-pomodoros');

        const btnLogin = document.getElementById('btn-login');
        const btnLogout = document.getElementById('btn-logout');
        const userProfile = document.getElementById('user-profile');
        const userAvatar = document.getElementById('user-avatar');
        const userName = document.getElementById('user-name');

        // デフォルトの日付に今日を設定
        todoDate.value = new Date().toISOString().split('T')[0];

        // --- 4. フルカレンダーの初期化 ---
        let calendar;
        const calendarEl = document.getElementById('calendar');
        calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            locale: 'ja',
            headerToolbar: { left: 'prev,next', center: 'title', right: 'today' },
            editable: true,
            events: [],
            eventClick: function(info) {
                if(confirm(`タスク「${info.event.title}」を完了/未完了に切り替えますか？`)) {
                    toggleTodo(info.event.id);
                }
            }
        });
        calendar.render();

        // --- 5. データ保存・同期機能 ---
        async function saveData() {
            if (isFirebaseActive && state.user) {
                try {
                    await setDoc(doc(db, "users", state.user.uid), {
                        todos: state.todos,
                        pomodoroCount: state.pomodoroCount
                    });
                } catch (e) {
                    console.error("Firestoreへの保存に失敗しました: ", e);
                }
            } else {
                localStorage.setItem('studydesk_todos', JSON.stringify(state.todos));
                localStorage.setItem('studydesk_pomo', state.pomodoroCount);
            }
            render();
        }

        async function loadData() {
            if (isFirebaseActive && state.user) {
                const docRef = doc(db, "users", state.user.uid);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    state.todos = data.todos || [];
                    state.pomodoroCount = data.pomodoroCount || 0;
                } else {
                    state.todos = [];
                    state.pomodoroCount = 0;
                }
            } else {
                state.todos = JSON.parse(localStorage.getItem('studydesk_todos')) || [];
                state.pomodoroCount = parseInt(localStorage.getItem('studydesk_pomo')) || 0;
            }
            render();
        }

        // --- 6. タイマーロジック ---
        function updateTimerDisplay() {
            const m = String(state.timer.minutes).padStart(2, '0');
            const s = String(state.timer.seconds).padStart(2, '0');
            timerDisplay.textContent = `${m}:${s}`;
        }

        function startTimer() {
            if (state.timer.isRunning) return;
            state.timer.isRunning = true;
            btnTimerStart.classList.add('hidden');
            btnTimerPause.classList.remove('hidden');

            state.timer.intervalId = setInterval(() => {
                if (state.timer.seconds === 0) {
                    if (state.timer.minutes === 0) {
                        // タイマー終了処理
                        clearInterval(state.timer.intervalId);
                        state.timer.isRunning = false;
                        playAlarmSound();

                        if (!state.timer.isBreak) {
                            state.pomodoroCount++;
                            state.timer.isBreak = true;
                            state.timer.minutes = 5;
                            timerStatus.textContent = "休憩時間 (5分)";
                            timerStatus.className = "text-xs font-bold uppercase tracking-wider bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full";
                        } else {
                            state.timer.isBreak = false;
                            state.timer.minutes = 25;
                            timerStatus.textContent = "集中時間 (25分)";
                            timerStatus.className = "text-xs font-bold uppercase tracking-wider bg-red-100 text-red-700 px-3 py-1 rounded-full";
                        }
                        btnTimerStart.classList.remove('hidden');
                        btnTimerPause.classList.add('hidden');
                        saveData();
                        return;
                    }
                    state.timer.minutes--;
                    state.timer.seconds = 59;
                } else {
                    state.timer.seconds--;
                }
                updateTimerDisplay();
            }, 1000);
        }

        function pauseTimer() {
            clearInterval(state.timer.intervalId);
            state.timer.isRunning = false;
            btnTimerStart.classList.remove('hidden');
            btnTimerPause.classList.add('hidden');
        }

        function resetTimer() {
            clearInterval(state.timer.intervalId);
            state.timer.isRunning = false;
            state.timer.isBreak = false;
            state.timer.minutes = 25;
            state.timer.seconds = 0;
            timerStatus.textContent = "集中時間 (25分)";
            timerStatus.className = "text-xs font-bold uppercase tracking-wider bg-red-100 text-red-700 px-3 py-1 rounded-full";
            btnTimerStart.classList.remove('hidden');
            btnTimerPause.classList.add('hidden');
            updateTimerDisplay();
        }

        // --- 7. UIレンダリング ---
        function render() {
            // TODOリストの描画
            todoList.innerHTML = '';
            
            if (state.todos.length === 0) {
                todoList.innerHTML = `<p class="text-center text-gray-400 text-xs py-8">タスクがありません</p>`;
            } else {
                // 日付順・未完了優先でソート
                const sortedTodos = [...state.todos].sort((a,b) => new Date(a.date) - new Date(b.date) || a.completed - b.completed);
                
                sortedTodos.forEach(todo => {
                    const todoItem = document.createElement('div');
                    todoItem.className = `flex items-center justify-between p-3 rounded-xl border transition ${todo.completed ? 'bg-gray-50 border-gray-100 opacity-60' : 'bg-white border-gray-200 shadow-sm'}`;
                    
                    // コストの星を生成
                    let stars = '';
                    for(let i=1; i<=5; i++) {
                        stars += `<i class="fa-solid fa-star text-[10px] ${i <= todo.cost ? 'text-amber-400' : 'text-gray-200'}"></i>`;
                    }

                    todoItem.innerHTML = `
                        <div class="flex items-center gap-3 min-w-0 flex-1">
                            <button class="btn-toggle text-xl text-gray-300 hover:text-indigo-600 transition shrink-0">
                                <i class="${todo.completed ? 'fa-solid fa-circle-check text-indigo-500' : 'fa-regular fa-circle'}"></i>
                            </button>
                            <div class="min-w-0 flex-1">
                                <p class="text-sm font-medium ${todo.completed ? 'line-through text-gray-400' : 'text-gray-700'} break-words">${escapeHTML(todo.text)}</p>
                                <div class="flex items-center gap-2 mt-0.5">
                                    <span class="text-[10px] bg-gray-100 px-1.5 py-0.5 rounded text-gray-500 font-mono">${todo.date}</span>
                                    <div class="flex">${stars}</div>
                                </div>
                            </div>
                        </div>
                        <button class="btn-delete text-gray-300 hover:text-red-500 p-1 transition ml-2 shrink-0">
                            <i class="fa-regular fa-trash-can"></i>
                        </button>
                    `;

                    // イベントリスナーの追加
                    todoItem.querySelector('.btn-toggle').addEventListener('click', () => toggleTodo(todo.id));
                    todoItem.querySelector('.btn-delete').addEventListener('click', () => deleteTodo(todo.id));
                    
                    todoList.appendChild(todoItem);
                });
            }

            // 進捗統計の計算
            const todayStr = new Date().toISOString().split('T')[0];
            const todayTodos = state.todos.filter(t => t.date === todayStr);
            const todayCompleted = todayTodos.filter(t => t.completed).length;
            
            const totalCompleted = state.todos.filter(t => t.completed).length;
            statCompleted.textContent = totalCompleted;
            statPomodoros.textContent = state.pomodoroCount;

            const percent = todayTodos.length > 0 ? Math.round((todayCompleted / todayTodos.length) * 100) : 0;
            progressBar.style.width = `${percent}%`;
            progressPercent.textContent = `${percent}%`;

            // カレンダーイベントの更新
            const calendarEvents = state.todos.map(todo => ({
                id: todo.id,
                title: `${'★'.repeat(todo.cost)} ${todo.text}`,
                start: todo.date,
                allDay: true,
                backgroundColor: todo.completed ? '#9ca3af' : '#6366f1',
                borderColor: todo.completed ? '#9ca3af' : '#6366f1',
                textColor: '#ffffff'
            }));
            
            calendar.removeAllEvents();
            calendar.addEventSource(calendarEvents);
        }

        // --- 8. タスク操作ロジック ---
        function addTodo(text, date, cost) {
            const newTodo = {
                id: Date.now().toString(),
                text: text,
                date: date,
                cost: cost,
                completed: false
            };
            state.todos.push(newTodo);
            saveData();
        }

        function toggleTodo(id) {
            state.todos = state.todos.map(todo => 
                todo.id === id ? { ...todo, completed: !todo.completed } : todo
            );
            saveData();
        }

        function deleteTodo(id) {
            if(confirm("このタスクを削除しますか？")) {
                state.todos = state.todos.filter(todo => todo.id !== id);
                saveData();
            }
        }

        // コストセレクターのインタラクション
        costSelector.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const selectedCost = parseInt(e.currentTarget.getAttribute('data-cost'));
                state.settings.currentCost = selectedCost;
                
                costSelector.querySelectorAll('button').forEach(b => {
                    const bCost = parseInt(b.getAttribute('data-cost'));
                    if (bCost <= selectedCost) {
                        b.classList.remove('text-gray-300');
                        b.classList.add('text-amber-400');
                    } else {
                        b.classList.remove('text-amber-400');
                        b.classList.add('text-gray-300');
                    }
                });
            });
        });

        // フォーム送信
        todoForm.addEventListener('submit', (e) => {
            e.preventDefault();
            if (!todoInput.value.trim()) return;
            addTodo(todoInput.value.trim(), todoDate.value, state.settings.currentCost);
            todoInput.value = '';
        });

        // タイマー系イベント
        btnTimerStart.addEventListener('click', startTimer);
        btnTimerPause.addEventListener('click', pauseTimer);
        btnTimerReset.addEventListener('click', resetTimer);
        
        btnSoundToggle.addEventListener('click', () => {
            state.settings.soundOn = !state.settings.soundOn;
            if(state.settings.soundOn) {
                soundIcon.className = "fa-solid fa-volume-high";
                btnSoundToggle.className = "text-gray-500 hover:text-indigo-600 transition text-lg";
            } else {
                soundIcon.className = "fa-solid fa-volume-xmark";
                btnSoundToggle.className = "text-red-400 hover:text-red-500 transition text-lg";
            }
        });

        // エスケープ関数
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        // --- 9. 認証 (Auth) 制御 ---
        if (isFirebaseActive) {
            btnLogin.addEventListener('click', async () => {
                try {
                    await signInWithPopup(auth, provider);
                } catch (e) {
                    console.error("ログインエラー: ", e);
                    alert("Googleログインに失敗しました。");
                }
            });

            btnLogout.addEventListener('click', () => {
                signOut(auth);
            });

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    state.user = user;
                    userName.textContent = user.displayName;
                    userAvatar.src = user.photoURL;
                    btnLogin.classList.add('hidden');
                    userProfile.classList.remove('hidden');
                } else {
                    state.user = null;
                    btnLogin.classList.remove('hidden');
                    userProfile.classList.add('hidden');
                }
                loadData();
            });
        } else {
            // Firebase未設定時はボタンを非表示、ローカル環境で読み込み
            btnLogin.innerHTML = `<i class="fa-solid fa-cloud-sun"></i> ローカルモード`;
            btnLogin.className = "bg-gray-100 text-gray-500 px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2 cursor-default";
            loadData();
        }
    </script>
</body>
</html>
