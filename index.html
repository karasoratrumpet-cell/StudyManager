<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyManager - ポモドーロ ＆ TODOタスクマネージャー</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📝</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <style>
        .fc-event { cursor: pointer; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .light-glass { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(229, 231, 235, 0.5); }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex flex-col transition-colors duration-300">

    <header class="border-b border-slate-800 bg-slate-900/80 backdrop-blur sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 rounded-xl bg-indigo-600 flex items-center justify-between p-2 shadow-lg shadow-indigo-500/30">
                    <i class="fa-solid fa-graduation-cap text-white text-xl"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">StudyDesk</h1>
                    <p class="text-xs text-slate-400">ポモドーロ ＆ 高機能TODO</p>
                </div>
            </div>
            
            <nav class="flex space-x-1 bg-slate-800 p-1 rounded-xl">
                <button data-tab="dashboard" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium transition-all duration-200 flex items-center space-x-2 bg-indigo-600 text-white shadow"><i class="fa-solid fa-chart-pie"></i><span class="hidden sm:inline">ダッシュボード</span></button>
                <button data-tab="todos" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium transition-all duration-200 flex items-center space-x-2 text-slate-400 hover:text-slate-200"><i class="fa-solid fa-list-check"></i><span class="hidden sm:inline">タスク管理</span></button>
                <button data-tab="calendar-tab" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium transition-all duration-200 flex items-center space-x-2 text-slate-400 hover:text-slate-200"><i class="fa-solid fa-calendar-days"></i><span class="hidden sm:inline">カレンダー</span></button>
            </nav>

            <div class="flex items-center space-x-4">
                <button id="themeToggle" class="p-2 rounded-lg bg-slate-800 text-slate-400 hover:text-slate-200 transition"><i class="fa-solid fa-moon"></i></button>
                <button id="btnLogin" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium rounded-xl transition flex items-center space-x-2 shadow-lg shadow-indigo-500/20"><i class="fa-brands fa-google"></i><span>連携</span></button>
                <div id="userProfile" class="flex items-center space-x-3 hidden">
                    <img id="userAvatar" class="w-8 h-8 rounded-full border border-slate-700" src="" alt="Avatar">
                    <span id="userName" class="text-sm font-medium text-slate-300 hidden md:inline">ユーザー</span>
                    <button id="btnLogout" class="text-xs text-rose-400 hover:text-rose-300 transition underline">解除</button>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-7xl w-full mx-auto p-4 sm:p-6 lg:p-8 space-y-8">
        
        <div id="dashboard" class="tab-content active space-y-6">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 dark-glass rounded-2xl p-6 flex flex-col justify-between relative overflow-hidden shadow-xl shadow-black/20">
                    <div class="absolute -right-10 -top-10 w-40 h-40 bg-indigo-500/10 rounded-full blur-3xl"></div>
                    <div class="flex justify-between items-center z-10">
                        <div class="flex space-x-2 bg-slate-900/60 p-1 rounded-xl border border-slate-800">
                            <button id="btnPomoMode" class="px-4 py-1.5 text-xs font-semibold rounded-lg bg-indigo-600 text-white shadow">ポモドーロ</button>
                            <button id="btnShortMode" class="px-4 py-1.5 text-xs font-semibold rounded-lg text-slate-400 hover:text-slate-200">短い休憩</button>
                            <button id="btnLongMode" class="px-4 py-1.5 text-xs font-semibold rounded-lg text-slate-400 hover:text-slate-200">長い休憩</button>
                        </div>
                        <span id="pomoCounter" class="text-xs font-semibold px-3 py-1.5 bg-emerald-500/10 text-emerald-400 rounded-xl border border-emerald-500/20 flex items-center space-x-1.5"><i class="fa-solid fa-tomato"></i><span>完了数: 0</span></span>
                    </div>

                    <div class="my-8 text-center z-10">
                        <div id="timerDisplay" class="text-7xl sm:text-8xl font-black tracking-tight font-mono text-slate-100 drop-shadow-md">25:00</div>
                        <p id="timerLabel" class="text-sm text-slate-400 font-medium mt-2 tracking-wider uppercase">集中セッション</p>
                    </div>

                    <div class="flex items-center space-x-4 z-10">
                        <button id="btnStart" class="flex-1 py-4 bg-indigo-600 hover:bg-indigo-500 active:scale-[0.98] text-white font-bold rounded-xl shadow-lg shadow-indigo-600/30 transition flex items-center justify-center space-x-2 text-base"><i class="fa-solid fa-play"></i><span>タイマーを開始する</span></button>
                        <button id="btnReset" class="px-5 py-4 bg-slate-800 hover:bg-slate-700 text-slate-300 font-semibold rounded-xl border border-slate-700 transition flex items-center justify-center"><i class="fa-solid fa-rotate-right"></i></button>
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-1 gap-6">
                    <div class="dark-glass rounded-2xl p-6 flex items-center space-x-4 shadow-lg shadow-black/10">
                        <div class="w-12 h-12 rounded-xl bg-purple-500/10 border border-purple-500/20 flex items-center justify-center text-purple-400 text-xl"><i class="fa-solid fa-hourglass-half"></i></div>
                        <div>
                            <p class="text-xs text-slate-400 font-medium">合計集中時間</p>
                            <p id="statTotalTime" class="text-2xl font-bold tracking-tight">0 分</p>
                        </div>
                    </div>
                    <div class="dark-glass rounded-2xl p-6 flex items-center space-x-4 shadow-lg shadow-black/10">
                        <div class="w-12 h-12 rounded-xl bg-pink-500/10 border border-pink-500/20 flex items-center justify-center text-pink-400 text-xl"><i class="fa-solid fa-fire"></i></div>
                        <div>
                            <p class="text-xs text-slate-400 font-medium">直近24時間の完了タスク</p>
                            <p id="statRecentDone" class="text-2xl font-bold tracking-tight text-pink-400">0</p>
                        </div>
                    </div>
                    <div class="dark-glass rounded-2xl p-6 flex items-center space-x-4 shadow-lg shadow-black/10">
                        <div class="w-12 h-12 rounded-xl bg-amber-500/10 border border-amber-500/20 flex items-center justify-center text-amber-400 text-xl"><i class="fa-solid fa-star-half-stroke"></i></div>
                        <div>
                            <p class="text-xs text-slate-400 font-medium">現在の総コスト負荷</p>
                            <p id="statTotalCost" class="text-2xl font-bold tracking-tight text-amber-400">★ 0</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="dark-glass rounded-2xl p-6 shadow-xl shadow-black/10">
                <div class="flex justify-between items-center mb-4">
                    <div class="flex items-center space-x-2">
                        <i class="fa-solid fa-bolt text-amber-400"></i>
                        <h3 class="font-bold text-base">本日・期限内の優先タスク</h3>
                    </div>
                    <span id="countTodayTasks" class="text-xs bg-slate-800 px-2.5 py-1 rounded-lg border border-slate-700 text-slate-400">0件</span>
                </div>
                <div id="todayTasksContainer" class="divide-y divide-slate-800 max-h-[280px] overflow-y-auto pr-1">
                    </div>
            </div>
        </div>

        <div id="todos" class="tab-content space-y-6">
            <div class="dark-glass rounded-2xl p-6 shadow-xl shadow-black/10">
                <form id="todoForm" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="md:col-span-2">
                            <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">何を行いますか？ <span class="text-rose-500">*</span></label>
                            <input type="text" id="todoInput" required class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-2.5 text-sm text-slate-100 focus:outline-none focus:border-indigo-500 placeholder-slate-500 transition" placeholder="例: 数学のワークを進める...">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">コスト負荷 (1〜5) <span class="text-rose-500">*</span></label>
                            <select id="todoCost" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2.5 text-sm text-slate-100 focus:outline-none focus:border-indigo-500 transition">
                                <option value="1">★ 1 (超軽量・すぐ終わる)</option>
                                <option value="2">★ 2 (軽量・短時間)</option>
                                <option value="3" selected>★ 3 (普通・通常のタスク)</option>
                                <option value="4">★ 4 (高負荷・要集中)</option>
                                <option value="5">★ 5 (超高負荷・分解推奨)</option>
                            </select>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 items-end">
                        <div>
                            <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">開始日 <span class="text-rose-500">*</span></label>
                            <input type="date" id="todoDate" required class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-100 focus:outline-none focus:border-indigo-500 transition">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">期限日 (終了日) <span class="text-rose-500">*</span></label>
                            <input type="date" id="todoEndDate" required class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-100 focus:outline-none focus:border-indigo-500 transition">
                        </div>
                        <button type="submit" class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl transition shadow-lg shadow-indigo-600/20 flex items-center justify-center space-x-2 text-sm"><i class="fa-solid fa-plus"></i><span>タスクを追加する</span></button>
                    </div>
                </form>
            </div>

            <div class="flex flex-wrap items-center justify-between gap-4 bg-slate-800/40 border border-slate-800 px-4 py-3 rounded-xl">
                <div class="flex space-x-1 bg-slate-900/60 p-1 rounded-xl border border-slate-800">
                    <button id="filterAll" class="px-4 py-1.5 text-xs font-semibold rounded-lg bg-indigo-600 text-white shadow">すべて</button>
                    <button id="filterActive" class="px-4 py-1.5 text-xs font-semibold rounded-lg text-slate-400 hover:text-slate-200">進行中</button>
                    <button id="filterCompleted" class="px-4 py-1.5 text-xs font-semibold rounded-lg text-slate-400 hover:text-slate-200">完了済</button>
                </div>
                <div class="flex items-center space-x-2">
                    <label class="text-xs text-slate-400 font-medium">並び替え:</label>
                    <select id="sortSelect" class="bg-slate-900 border border-slate-700 rounded-lg px-2.5 py-1.5 text-xs text-slate-300 focus:outline-none">
                        <option value="dateAsc">開始日が近い順</option>
                        <option value="dateDesc">開始日が遠い順</option>
                        <option value="endDateAsc">期限が近い順</option>
                        <option value="costDesc">コストが高い順</option>
                        <option value="costAsc">コストが低い順</option>
                    </select>
                </div>
            </div>

            <div id="todoListContainer" class="space-y-3">
                </div>
        </div>

        <div id="calendar-tab" class="tab-content">
            <div class="dark-glass rounded-2xl p-6 shadow-xl shadow-black/10 bg-slate-900">
                <div id="calendar" class="w-full text-slate-200 text-sm"></div>
            </div>
        </div>

    </main>

    <footer class="border-t border-slate-800 py-6 bg-slate-950/40 text-center text-xs text-slate-500">
        <p>&copy; 2026 StudyDesk App. All rights reserved.</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.1.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.1.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.1.0/firebase-firestore.js";

        // Firebase設定項目（ダミー設定：実際のキーへ要置き換え）
        const firebaseConfig = { apiKey: "AIzaSyDummyKey_StudyDesk2025Fix", authDomain: "studydesk-demo.firebaseapp.com", projectId: "studydesk-demo", storageBucket: "studydesk-demo.appspot.com", messagingSenderId: "1234567890", appId: "1:1234:web:abcd" };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // 状態管理
        let state = { user: null, todos: [], pomodoroCount: 0, currentFilter: 'all', currentSort: 'dateAsc' };
        let timer = { minutes: 25, seconds: 0, intervalId: null, isRunning: false, currentMode: 'pomo' }; // pomo, short, long
        let unsubscribeFirestore = null;
        let calendar = null;

        // 音声（AudioContextによる電子ビープ音生成）
        function playBeep(type = 'success') {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (!audioCtx) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                if (type === 'success') {
                    osc.frequency.setValueAtTime(587.33, audioCtx.currentTime); // D5
                    osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.12); // A5
                    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.4);
                } else {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(330, audioCtx.currentTime); // E4
                    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.25);
                }
            } catch(e) { console.log("Audio play deferred:", e); }
        }

        // DOM参照
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');
        const themeToggle = document.getElementById('themeToggle');
        const btnLogin = document.getElementById('btnLogin');
        const btnLogout = document.getElementById('btnLogout');
        const userProfile = document.getElementById('userProfile');
        const userAvatar = document.getElementById('userAvatar');
        const userName = document.getElementById('userName');

        const timerDisplay = document.getElementById('timerDisplay');
        const timerLabel = document.getElementById('timerLabel');
        const btnStart = document.getElementById('btnStart');
        const btnReset = document.getElementById('btnReset');
        const btnPomoMode = document.getElementById('btnPomoMode');
        const btnShortMode = document.getElementById('btnShortMode');
        const btnLongMode = document.getElementById('btnLongMode');
        const pomoCounter = document.getElementById('pomoCounter');

        const statTotalTime = document.getElementById('statTotalTime');
        const statRecentDone = document.getElementById('statRecentDone');
        const statTotalCost = document.getElementById('statTotalCost');
        const countTodayTasks = document.getElementById('countTodayTasks');
        const todayTasksContainer = document.getElementById('todayTasksContainer');

        const todoForm = document.getElementById('todoForm');
        const todoInput = document.getElementById('todoInput');
        const todoCost = document.getElementById('todoCost');
        const todoDate = document.getElementById('todoDate');
        const todoEndDate = document.getElementById('todoEndDate');
        const todoListContainer = document.getElementById('todoListContainer');
        const sortSelect = document.getElementById('sortSelect');

        // 日付初期値
        const todayStr = new Date().toISOString().split('T')[0];
        todoDate.value = todayStr; todoEndDate.value = todayStr;

        // タブ切り替え
        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                tabBtns.forEach(b => b.classList.remove('bg-indigo-600', 'text-white', 'shadow'));
                tabBtns.forEach(b => b.classList.add('text-slate-400', 'hover:text-slate-200'));
                btn.classList.remove('text-slate-400', 'hover:text-slate-200');
                btn.classList.add('bg-indigo-600', 'text-white', 'shadow');
                
                const target = btn.dataset.tab;
                tabContents.forEach(tc => {
                    tc.classList.remove('active');
                    if(tc.id === target) tc.classList.add('active');
                });
                if (target === 'calendar-tab') { setTimeout(() => { calendar.render(); }, 50); }
            });
        });

        // テーマ切り替え (簡易版)
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('bg-slate-900');
            document.body.classList.toggle('bg-slate-50');
            document.body.classList.toggle('text-slate-100');
            document.body.classList.toggle('text-slate-900');
            const icon = themeToggle.querySelector('i');
            icon.classList.toggle('fa-moon'); icon.classList.toggle('fa-sun');
        });

        // タイマー制御用
        function changeTimerMode(mode, mins) {
            clearInterval(timer.intervalId);
            timer.isRunning = false; timer.currentMode = mode; timer.minutes = mins; timer.seconds = 0;
            btnStart.innerHTML = `<i class="fa-solid fa-play"></i><span>タイマーを開始する</span>`;
            
            [btnPomoMode, btnShortMode, btnLongMode].forEach(b => b.className = "px-4 py-1.5 text-xs font-semibold rounded-lg text-slate-400 hover:text-slate-200");
            if (mode === 'pomo') { btnPomoMode.className = "px-4 py-1.5 text-xs font-semibold rounded-lg bg-indigo-600 text-white shadow"; timerLabel.textContent = "集中セッション"; }
            else if (mode === 'short') { btnShortMode.className = "px-4 py-1.5 text-xs font-semibold rounded-lg bg-indigo-600 text-white shadow"; timerLabel.textContent = "短い休憩タイム"; }
            else if (mode === 'long') { btnLongMode.className = "px-4 py-1.5 text-xs font-semibold rounded-lg bg-indigo-600 text-white shadow"; timerLabel.textContent = "長い休憩タイム"; }
            updateTimerDisplay();
        }
        btnPomoMode.addEventListener('click', () => changeTimerMode('pomo', 25));
        btnShortMode.addEventListener('click', () => changeTimerMode('short', 5));
        btnLongMode.addEventListener('click', () => changeTimerMode('long', 15));

        function updateTimerDisplay() {
            const m = String(timer.minutes).padStart(2, '0');
            const s = String(timer.seconds).padStart(2, '0');
            timerDisplay.textContent = `${m}:${s}`;
        }

        btnStart.addEventListener('click', () => {
            if (timer.isRunning) {
                clearInterval(timer.intervalId); timer.isRunning = false;
                btnStart.innerHTML = `<i class="fa-solid fa-play"></i><span>タイマーを再開する</span>`;
            } else {
                timer.isRunning = true;
                btnStart.innerHTML = `<i class="fa-solid fa-pause"></i><span>タイマーを一時停止</span>`;
                timer.intervalId = setInterval(tick, 1000);
                playBeep('click');
            }
        });

        btnReset.addEventListener('click', () => {
            const defaultMins = timer.currentMode === 'pomo' ? 25 : (timer.currentMode === 'short' ? 5 : 15);
            changeTimerMode(timer.currentMode, defaultMins);
        });

        function tick() {
            if (timer.seconds === 0) {
                if (timer.minutes === 0) {
                    clearInterval(timer.intervalId); timer.isRunning = false;
                    playBeep('success');
                    if (timer.currentMode === 'pomo') {
                        state.pomodoroCount++;
                        pomoCounter.innerHTML = `<i class="fa-solid fa-tomato"></i><span>完了数: ${state.pomodoroCount}</span>`;
                        saveData(); changeTimerMode('short', 5);
                    } else { changeTimerMode('pomo', 25); }
                    return;
                }
                timer.minutes--; timer.seconds = 59;
            } else { timer.seconds--; }
            updateTimerDisplay();
        }

        // 同期・ローカル保存
        async function saveData() {
            if (state.user) {
                await setDoc(doc(db, "users", state.user.uid), { todos: state.todos, pomodoroCount: state.pomodoroCount });
            } else {
                localStorage.setItem('studydesk_todos', JSON.stringify(state.todos));
                localStorage.setItem('studydesk_pomo', state.pomodoroCount);
                render();
            }
        }

        function startRealtimeSync() {
            unsubscribeFirestore = onSnapshot(doc(db, "users", state.user.uid), (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    state.todos = data.todos || []; state.pomodoroCount = data.pomodoroCount || 0;
                } else { state.todos = []; state.pomodoroCount = 0; }
                pomoCounter.innerHTML = `<i class="fa-solid fa-tomato"></i><span>完了数: ${state.pomodoroCount}</span>`;
                render();
            });
        }

        // タスク操作イベント
        todoForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const newTodo = { id: crypto.randomUUID(), text: todoInput.value.trim(), cost: parseInt(todoCost.value), date: todoDate.value, endDate: todoEndDate.value, completed: false, createdAt: new Date().toISOString() };
            state.todos.push(newTodo); todoInput.value = ''; saveData(); if(!state.user) render();
        });

        window.toggleTodo = function(id) {
            state.todos = state.todos.map(t => t.id === id ? { ...t, completed: !t.completed, completedAt: !t.completed ? new Date().toISOString() : null } : t);
            saveData(); if(!state.user) render();
        }

        window.deleteTodo = function(id) {
            state.todos = state.todos.filter(t => t.id !== id);
            saveData(); if(!state.user) render();
        }

        // フィルタ切り替え
        const fAll = document.getElementById('filterAll'), fActive = document.getElementById('filterActive'), fComp = document.getElementById('filterCompleted');
        function setFilterBtn(activeBtn, mode) {
            [fAll, fActive, fComp].forEach(b => b.className = "px-4 py-1.5 text-xs font-semibold rounded-lg text-slate-400 hover:text-slate-200");
            activeBtn.className = "px-4 py-1.5 text-xs font-semibold rounded-lg bg-indigo-600 text-white shadow";
            state.currentFilter = mode; render();
        }
        fAll.addEventListener('click', () => setFilterBtn(fAll, 'all'));
        fActive.addEventListener('click', () => setFilterBtn(fActive, 'active'));
        fComp.addEventListener('click', () => setFilterBtn(fComp, 'completed'));
        sortSelect.addEventListener('change', () => { state.currentSort = sortSelect.value; render(); });

        // 描画コアロジック
        function render() {
            // 統計計算
            statTotalTime.textContent = `${state.pomodoroCount * 25} 分`;
            const now = new Date(); const oneDayAgo = new Date(now.getTime() - 24*60*60*1000);
            
            // 自動アーカイブ・クリーンアップ (完了から24時間以上経過したタスクを除去)
            const activeTodos = state.todos.filter(todo => {
                if (todo.completed && todo.completedAt) {
                    return new Date(todo.completedAt) > oneDayAgo;
                }
                return true;
            });
            if (activeTodos.length !== state.todos.length) { state.todos = activeTodos; localStorage.setItem('studydesk_todos', JSON.stringify(state.todos)); }

            const recentDoneCount = state.todos.filter(t => t.completed).length;
            statRecentDone.textContent = recentDoneCount;

            const totalCost = state.todos.filter(t => !t.completed).reduce((sum, t) => sum + t.cost, 0);
            statTotalCost.textContent = `★ ${totalCost}`;

            // 本日のタスク
            const todayTasks = state.todos.filter(t => !t.completed && t.date <= todayStr && todayStr <= t.endDate);
            countTodayTasks.textContent = `${todayTasks.length}件`;
            todayTasksContainer.innerHTML = todayTasks.length === 0 ? `<p class="text-xs text-slate-500 py-4 text-center">本日期限의 미완료 태스크가 없습니다</p>` : todayTasks.map(t => `
                <div class="flex justify-between items-center py-2.5 text-xs">
                    <span class="font-medium text-slate-200 truncate max-w-[70%]">${escapeHtml(t.text)}</span>
                    <span class="text-[10px] px-2 py-0.5 rounded bg-amber-500/10 text-amber-400 border border-amber-500/20 font-bold">★ ${t.cost} (〜${t.endDate.split('-')[2]}日)</span>
                </div>
            `).join('');

            // タスク管理タブ内リストのフィルタリング＆ソート
            let filtered = state.todos.filter(t => {
                if (state.currentFilter === 'active') return !t.completed;
                if (state.currentFilter === 'completed') return t.completed;
                return true;
            });

            filtered.sort((a, b) => {
                if (state.currentSort === 'dateAsc') return a.date.localeCompare(b.date);
                if (state.currentSort === 'dateDesc') return b.date.localeCompare(a.date);
                if (state.currentSort === 'endDateAsc') return a.endDate.localeCompare(b.endDate);
                if (state.currentSort === 'costDesc') return b.cost - a.cost;
                if (state.currentSort === 'costAsc') return a.cost - b.cost;
                return 0;
            });

            todoListContainer.innerHTML = filtered.length === 0 ? `<div class="text-center py-12 text-slate-500 text-sm bg-slate-800/20 rounded-xl border border-dashed border-slate-800"><i class="fa-solid fa-clipboard-list text-3xl mb-2 block opacity-40"></i>タスクが見つかりません</div>` : filtered.map(t => `
                <div class="flex items-center justify-between p-4 ${t.completed ? 'bg-slate-800/30 border border-slate-800/60 opacity-60' : 'dark-glass'} rounded-xl transition group shadow-sm">
                    <div class="flex items-center space-x-3 flex-1 min-w-0">
                        <input type="checkbox" ${t.completed ? 'checked' : ''} onclick="toggleTodo('${t.id}')" class="w-4 h-4 rounded text-indigo-600 bg-slate-900 border-slate-700 focus:ring-indigo-500 focus:ring-offset-slate-900 cursor-pointer">
                        <div class="min-w-0 flex-1">
                            <p class="text-sm font-semibold ${t.completed ? 'line-through text-slate-500' : 'text-slate-200'} truncate">${escapeHtml(t.text)}</p>
                            <p class="text-[11px] text-slate-400 mt-0.5 flex flex-wrap items-center gap-x-2">
                                <span><i class="fa-regular fa-calendar text-[10px]"></i> ${t.date} 〜 ${t.endDate}</span>
                                <span class="text-amber-400/90 font-medium">${'★'.repeat(t.cost)}</span>
                            </p>
                        </div>
                    </div>
                    <button onclick="deleteTodo('${t.id}')" class="p-2 text-slate-500 hover:text-rose-400 rounded-lg md:opacity-0 group-hover:opacity-100 transition"><i class="fa-regular fa-trash-can"></i></button>
                </div>
            `).join('');

            // カレンダー同期用イベント
            const calendarEvents = state.todos.map(todo => {
                let end = new Date(todo.endDate); end.setDate(end.getDate() + 1);
                return { id: todo.id, title: todo.text, start: todo.date, end: end.toISOString().split('T')[0], allDay: true, backgroundColor: todo.completed ? '#9ca3af' : '#6366f1', borderColor: todo.completed ? '#9ca3af' : '#6366f1', textColor: '#ffffff' };
            });

            if (calendar) {
                calendar.removeAllEvents();
                calendar.addEventSource(calendarEvents);
            }
        }

        // フルカレンダー初期化
        document.addEventListener('DOMContentLoaded', () => {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'ja',
                headerToolbar: { left: 'prev,next today', center: 'title', right: '' },
                height: 580,
                events: [],
                eventClick: function(info) { window.toggleTodo(info.event.id); }
            });
            calendar.render();
        });

        function escapeHtml(str) { return str ? str.replace(/[&<>'\"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)) : ''; }

        btnLogin.addEventListener('click', async () => {
            try { await signInWithPopup(auth, provider); } catch (e) { alert("ログインに失敗しました。Firebaseの設定（承認済みドメイン）を確認してください。"); }
        });
        btnLogout.addEventListener('click', () => {
            if (unsubscribeFirestore) unsubscribeFirestore();
            signOut(auth);
        });
        
        onAuthStateChanged(auth, (user) => {
            if (user) { 
                state.user = user; 
                userName.textContent = user.displayName; 
                userAvatar.src = user.photoURL; 
                btnLogin.classList.add('hidden'); 
                userProfile.classList.remove('hidden');
                startRealtimeSync(); 
            }
            else { 
                state.user = null; 
                btnLogin.classList.remove('hidden'); 
                userProfile.classList.add('hidden'); 
                if (unsubscribeFirestore) unsubscribeFirestore();
                state.todos = JSON.parse(localStorage.getItem('studydesk_todos')) || [];
                state.pomodoroCount = parseInt(localStorage.getItem('studydesk_pomo')) || 0;
                render();
            }
        });
        
        // 1分ごとに再描画して24時間超過タスクの自動クリーンアップを走らせる
        setInterval(render, 60000);
    </script>
</body>
</html>
