<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポモドーロ・TODO・カレンダー アプリ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #f4f6f9;
            --container-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #666666;
            --border-color: #e0e0e0;
            --primary-color: #4a90e2;
            --primary-hover: #357abd;
            --danger-color: #e74c3c;
            --danger-hover: #c0392b;
            --success-color: #2ecc71;
            --shadow: 0 4px 6px rgba(0,0,0,0.05);
            --cal-header-bg: #f8f9fa;
            --cal-today-bg: #e8f0fe;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #aaaaaa;
            --border-color: #333333;
            --primary-color: #3782df;
            --primary-hover: #4a90e2;
            --danger-color: #cf6679;
            --danger-hover: #e74c3c;
            --success-color: #03dac6;
            --shadow: 0 4px 6px rgba(0,0,0,0.3);
            --cal-header-bg: #2a2a2a;
            --cal-today-bg: #1a365d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
            transition: background-color 0.3s, color 0.3s, border-color 0.3s;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        @media (max-width: 900px) {
            .app-container {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background-color: var(--container-bg);
            border-radius: 12px;
            padding: 25px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
        }

        .panel-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }

        /* テーマ切り替えボタン */
        .theme-toggle {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 5px;
        }

        /* ポモドーロタイマー */
        .timer-display {
            font-size: 4rem;
            font-weight: 700;
            text-align: center;
            margin: 20px 0;
            font-variant-numeric: tabular-nums;
        }

        .timer-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
        }

        .btn-primary { background-color: var(--primary-color); color: white; }
        .btn-primary:hover { background-color: var(--primary-hover); }
        .btn-danger { background-color: var(--danger-color); color: white; }
        .btn-danger:hover { background-color: var(--danger-hover); }
        .btn-secondary { background-color: var(--border-color); color: var(--text-main); }

        /* TODOリストフォーム */
        .todo-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .form-row {
            display: flex;
            gap: 10px;
        }

        input[type="text"], input[type="date"], select {
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background-color: var(--container-bg);
            color: var(--text-main);
            font-size: 0.95rem;
        }

        input[type="text"] { flex: 1; }

        /* 星評価 (コスト) */
        .star-rating {
            display: flex;
            flex-direction: row-reverse;
            justify-content: flex-end;
            gap: 5px;
            font-size: 1.25rem;
        }

        .star-rating input { display: none; }
        .star-rating label {
            color: var(--border-color);
            cursor: pointer;
        }

        .star-rating label:hover,
        .star-rating label:hover ~ label,
        .star-rating input:checked ~ label {
            color: #f1c40f;
        }

        /* タスクリスト */
        .task-list {
            list-style: none;
            max-height: 300px;
            overflow-y: auto;
        }

        .task-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            margin-bottom: 8px;
            background-color: var(--bg-color);
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .task-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .task-details {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .task-date {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .task-cost {
            color: #f1c40f;
            font-size: 0.85rem;
        }

        .task-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            font-size: 1rem;
        }
        .icon-btn.complete { color: var(--success-color); }
        .icon-btn.delete { color: var(--danger-color); }

        /* カレンダー */
        .calendar-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            border-top: 1px solid var(--border-color);
            border-left: 1px solid var(--border-color);
        }

        .calendar-header-cell {
            background-color: var(--cal-header-bg);
            padding: 8px 0;
            text-align: center;
            font-weight: 600;
            font-size: 0.85rem;
            border-right: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }

        .calendar-cell {
            min-height: 85px;
            padding: 6px;
            border-right: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            position: relative;
            background-color: var(--container-bg);
        }

        .calendar-cell.other-month {
            opacity: 0.4;
        }

        .calendar-cell.today {
            background-color: var(--cal-today-bg);
        }

        .day-number {
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 4px;
            display: block;
        }

        .calendar-tasks {
            display: flex;
            flex-direction: column;
            gap: 3px;
            max-height: 60px;
            overflow-y: auto;
        }

        .calendar-task-indicator {
            font-size: 0.7rem;
            padding: 2px 4px;
            background-color: var(--primary-color);
            color: white;
            border-radius: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
        }

        .calendar-task-indicator.completed {
            background-color: var(--text-muted);
            text-decoration: line-through;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="left-column" style="display: flex; flex-direction: column; gap: 25px;">
            <div class="panel">
                <div class="panel-title">
                    <span><i class="fa-solid fa-clock"></i> ポモドーロタイマー</span>
                    <button class="theme-toggle" id="themeToggle" title="テーマ切り替え">
                        <i class="fa-solid fa-moon"></i>
                    </button>
                </div>
                <div class="timer-display" id="timerDisplay">25:00</div>
                <div class="timer-controls">
                    <button class="btn-primary" id="startStopBtn"><i class="fa-solid fa-play"></i> スタート</button>
                    <button class="btn-secondary" id="resetBtn"><i class="fa-solid fa-rotate-right"></i> リセット</button>
                </div>
                <div style="display: flex; justify-content: center; gap: 10px;">
                    <button class="btn-secondary" onclick="setTimer(25)">ポモドーロ (25分)</button>
                    <button class="btn-secondary" onclick="setTimer(5)">短い休憩 (5分)</button>
                </div>
            </div>

            <div class="panel">
                <div class="panel-title">
                    <span><i class="fa-solid fa-list-check"></i> タスクリスト</span>
                </div>
                <form class="todo-form" id="todoForm" onsubmit="addTask(event)">
                    <div class="form-row">
                        <input type="text" id="taskInput" placeholder="新しいタスクを入力..." required>
                        <input type="date" id="dateInput" required>
                    </div>
                    <div class="form-row" style="justify-content: space-between; align-items: center;">
                        <span style="font-size: 0.9rem; color: var(--text-muted);">コスト (最大3):</span>
                        <div class="star-rating">
                            <input type="radio" id="star3" name="cost" value="3"><label for="star3" class="fa-solid fa-star"></label>
                            <input type="radio" id="star2" name="cost" value="2"><label for="star2" class="fa-solid fa-star"></label>
                            <input type="radio" id="star1" name="cost" value="1" checked><label for="star1" class="fa-solid fa-star"></label>
                        </div>
                        <button type="submit" class="btn-primary"><i class="fa-solid fa-plus"></i> 追加</button>
                    </div>
                </form>
                <ul class="task-list" id="taskList"></ul>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title">
                <span><i class="fa-solid fa-calendar-days"></i> カレンダー連動</span>
            </div>
            <div class="calendar-nav">
                <button class="btn-secondary" id="prevMonth"><i class="fa-solid fa-chevron-left"></i></button>
                <h3 id="calendarMonthYear"></h3>
                <button class="btn-secondary" id="nextMonth"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>
        </div>
    </div>

    <script>
        // --- 状態管理 ---
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        let currentTheme = localStorage.getItem('theme') || 'light';
        
        // タイマー状態
        let timerInterval = null;
        let timeRemaining = 25 * 60;
        let isRunning = false;

        // カレンダー状態
        let currentCalendarDate = new Date();

        // --- 初期化 ---
        document.documentElement.setAttribute('data-theme', currentTheme);
        updateThemeIcon();
        initCalendarHeaders();
        updateCalendar();
        renderTasks();
        
        // 今日をデフォルトの日付にする
        document.getElementById('dateInput').value = new Date().toISOString().split('T')[0];

        // --- テーマ切り替え ---
        document.getElementById('themeToggle').addEventListener('click', () => {
            currentTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', currentTheme);
            localStorage.setItem('theme', currentTheme);
            updateThemeIcon();
        });

        function updateThemeIcon() {
            const icon = document.getElementById('themeToggle').querySelector('i');
            if (currentTheme === 'dark') {
                icon.className = 'fa-solid fa-sun';
            } else {
                icon.className = 'fa-solid fa-moon';
            }
        }

        // --- ポモドーロタイマー機能 ---
        const timerDisplay = document.getElementById('timerDisplay');
        const startStopBtn = document.getElementById('startStopBtn');
        const resetBtn = document.getElementById('resetBtn');

        function updateTimerDisplay() {
            const minutes = Math.floor(timeRemaining / 60).toString().padStart(2, '0');
            const seconds = (timeRemaining % 60).toString().padStart(2, '0');
            timerDisplay.textContent = `${minutes}:${seconds}`;
        }

        function setTimer(minutes) {
            clearInterval(timerInterval);
            isRunning = false;
            timeRemaining = minutes * 60;
            startStopBtn.innerHTML = '<i class="fa-solid fa-play"></i> スタート';
            updateTimerDisplay();
        }

        startStopBtn.addEventListener('click', () => {
            if (isRunning) {
                clearInterval(timerInterval);
                startStopBtn.innerHTML = '<i class="fa-solid fa-play"></i> スタート';
            } else {
                timerInterval = setInterval(() => {
                    if (timeRemaining > 0) {
                        timeRemaining--;
                        updateTimerDisplay();
                    } else {
                        clearInterval(timerInterval);
                        alert('時間になりました！');
                        setTimer(25);
                    }
                }, 1000);
                startStopBtn.innerHTML = '<i class="fa-solid fa-pause"></i> 一時停止';
            }
            isRunning = !isRunning;
        });

        resetBtn.addEventListener('click', () => {
            setTimer(25);
        });

        // --- TODOリスト機能 ---
        function saveTasks() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
            renderTasks();
            updateCalendar();
        }

        function addTask(e) {
            e.preventDefault();
            const title = document.getElementById('taskInput').value;
            const date = document.getElementById('dateInput').value;
            const cost = parseInt(document.querySelector('input[name="cost"]:checked').value);

            const newTask = {
                id: Date.now().toString(),
                title,
                date,
                cost,
                completed: false
            };

            tasks.push(newTask);
            saveTasks();
            
            document.getElementById('taskInput').value = '';
            document.getElementById('star1').checked = true;
        }

        function toggleTask(id) {
            tasks = tasks.map(task => task.id === id ? { ...task, completed: !task.completed } : task);
            saveTasks();
        }

        function deleteTask(id) {
            tasks = tasks.filter(task => task.id !== id);
            saveTasks();
        }

        function renderTasks() {
            const taskList = document.getElementById('taskList');
            taskList.innerHTML = '';

            // 日付順にソートして表示
            const sortedTasks = [...tasks].sort((a, b) => new Date(a.date) - new Date(b.date));

            sortedTasks.forEach(task => {
                const li = document.createElement('li');
                li.className = `task-item ${task.completed ? 'completed' : ''}`;

                const stars = '★'.repeat(task.cost) + '☆'.repeat(3 - task.cost);

                li.innerHTML = `
                    <div class="task-info">
                        <div class="task-details">
                            <span class="task-text">${escapeHTML(task.title)}</span>
                            <span class="task-date"><i class="fa-solid fa-calendar-day"></i> ${task.date}</span>
                            <span class="task-cost">${stars}</span>
                        </div>
                    </div>
                    <div class="task-actions">
                        <button class="icon-btn complete" onclick="toggleTask('${task.id}')" title="完了/未完了">
                            <i class="fa-solid ${task.completed ? 'fa-circle-check' : 'fa-circle'}"></i>
                        </button>
                        <button class="icon-btn delete" onclick="deleteTask('${task.id}')" title="削除">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                `;
                taskList.appendChild(li);
            });
        }

        // --- カレンダー機能 ---
        function initCalendarHeaders() {
            const grid = document.getElementById('calendarGrid');
            const weekDays = ['日', '月', '火', '水', '木', '金', '土'];
            weekDays.forEach(day => {
                const cell = document.createElement('div');
                cell.className = 'calendar-header-cell';
                cell.textContent = day;
                grid.appendChild(cell);
            });
        }

        document.getElementById('prevMonth').addEventListener('click', () => {
            currentCalendarDate.setMonth(currentCalendarDate.getMonth() - 1);
            updateCalendar();
        });

        document.getElementById('nextMonth').addEventListener('click', () => {
            currentCalendarDate.setMonth(currentCalendarDate.getMonth() + 1);
            updateCalendar();
        });

        function updateCalendar() {
            const grid = document.getElementById('calendarGrid');
            
            // 既存のヘッダー以外のセルをクリア
            const cells = grid.querySelectorAll('.calendar-cell');
            cells.forEach(c => c.remove());

            const year = currentCalendarDate.getFullYear();
            const month = currentCalendarDate.getMonth();

            document.getElementById('calendarMonthYear').textContent = `${year}年 ${month + 1}月`;

            // 月の初日の曜日と総日数を取得
            const firstDayIndex = new Date(year, month, 1).getDay();
            const totalDays = new Date(year, month + 1, 0).getDate();
            const prevTotalDays = new Date(year, month, 0).getDate();

            // 前月の埋め合わせ
            for (let i = firstDayIndex - 1; i >= 0; i--) {
                createCalendarCell(year, month - 1, prevTotalDays - i, true);
            }

            // 当月の描画
            const today = new Date();
            for (let i = 1; i <= totalDays; i++) {
                const isToday = today.getFullYear() === year && today.getMonth() === month && today.getDate() === i;
                createCalendarCell(year, month, i, false, isToday);
            }

            // 翌月の埋め合わせ (合計6行 = 42セルになるように調整)
            const totalRendered = firstDayIndex + totalDays;
            const nextMonthDays = 42 - totalRendered;
            for (let i = 1; i <= nextMonthDays; i++) {
                createCalendarCell(year, month + 1, i, true);
            }
        }

        function createCalendarCell(year, month, day, isOtherMonth, isToday = false) {
            const grid = document.getElementById('calendarGrid');
            const cell = document.createElement('div');
            cell.className = `calendar-cell ${isOtherMonth ? 'other-month' : ''} ${isToday ? 'today' : ''}`;

            // セルに日付ナンバーを追加
            const dayNum = document.createElement('span');
            dayNum.className = 'day-number';
            dayNum.textContent = day;
            cell.appendChild(dayNum);

            // このセルの日付文字列を生成 (YYYY-MM-DD 形式)
            const cellDate = new Date(year, month, day);
            const dateStr = formatDateString(cellDate);

            // この日付に該当するタスクを抽出して配置
            const tasksContainer = document.createElement('div');
            tasksContainer.className = 'calendar-tasks';

            const dayTasks = tasks.filter(t => t.date === dateStr);
            dayTasks.forEach(task => {
                const indicator = document.createElement('div');
                indicator.className = `calendar-task-indicator ${task.completed ? 'completed' : ''}`;
                
                // カレンダー上のタスク名からコスト(★や☆)を除外し、タイトルのみを表示
                indicator.textContent = task.title;
                
                indicator.title = `${task.title} (コスト: ${task.cost})`;
                indicator.onclick = () => toggleTask(task.id);
                tasksContainer.appendChild(indicator);
            });

            cell.appendChild(tasksContainer);
            grid.appendChild(cell);
        }

        // ユーティリティ関数
        function formatDateString(date) {
            const offset = date.getTimezoneOffset();
            const adjustedDate = new Date(date.getTime() - (offset * 60 * 1000));
            return adjustedDate.toISOString().split('T')[0];
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }
    </script>
</body>
</html>
