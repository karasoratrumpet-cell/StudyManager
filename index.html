<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyManager - ポモドーロ ＆ TODOタスクマネージャー</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <style>
        .fc-theme-standard td, .fc-theme-standard th { border-color: #e5e7eb; }
        .fc .fc-button-primary { background-color: #3b82f6; border-color: #3b82f6; }
        .fc .fc-button-primary:hover { background-color: #2563eb; border-color: #2563eb; }
        .fc .fc-toolbar-title { font-size: 1.25rem !important; font-weight: 700; }
        .fc .fc-button { font-size: 0.75rem !important; padding: 0.4rem 0.8rem !important; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <nav class="bg-white shadow-sm border-b border-gray-200 px-6 py-3 flex justify-between items-center">
        <h1 class="text-xl font-bold text-indigo-600 flex items-center gap-2">
            <i class="fa-solid fa-graduation-cap"></i> StudyManager
        </h1>
        <div id="auth-section">
            <button id="btn-login" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2 transition">
                <i class="fa-brands fa-google"></i> Googleログイン
            </button>
            <div id="user-profile" class="hidden flex items-center gap-3">
                <img id="user-avatar" class="w-8 h-8 rounded-full border" src="" alt="User Avatar">
                <span id="user-name" class="text-sm font-medium text-gray-700"></span>
                <button id="btn-logout" class="text-gray-500 hover:text-red-600 text-sm font-medium transition">ログアウト</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 lg:p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <div class="space-y-6">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 text-center">
                <div class="flex justify-between items-center mb-4">
                    <span id="timer-status" class="text-xs font-bold uppercase tracking-wider bg-red-100 text-red-700 px-3 py-1 rounded-full">集中 (25分)</span>
                    <button id="btn-sound-toggle" class="text-gray-500 hover:text-indigo-600 transition text-lg">
                        <i id="sound-icon" class="fa-solid fa-volume-high"></i>
                    </button>
                </div>
                <div id="timer-display" class="text-6xl font-mono font-bold text-gray-900 my-6">25:00</div>
                <div class="flex justify-center gap-3">
                    <button id="btn-timer-start" class="bg-red-500 hover:bg-red-600 text-white font-medium px-6 py-2.5 rounded-xl transition flex items-center gap-2 w-28 justify-center">
                        <i class="fa-solid fa-play"></i> 開始
                    </button>
                    <button id="btn-timer-pause" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium px-6 py-2.5 rounded-xl transition flex items-center gap-2 w-28 justify-center hidden">
                        <i class="fa-solid fa-pause"></i> 一時停止
                    </button>
                    <button id="btn-timer-reset" class="bg-gray-100 hover:bg-gray-200 text-gray-500 font-medium px-4 py-2.5 rounded-xl transition">リセット</button>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6">
                <h3 class="font-bold text-gray-900 mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-fire text-orange-500"></i> 今日の進捗
                </h3>
                <div class="space-y-4">
                    <div>
                        <div class="flex justify-between text-sm mb-1">
                            <span class="text-gray-500">完了率</span>
                            <span id="progress-percent" class="font-semibold text-indigo-600">0%</span>
                        </div>
                        <div class="w-full bg-gray-100 h-2.5 rounded-full overflow-hidden">
                            <div id="progress-bar" class="bg-indigo-600 h-full transition-all duration-500" style="width: 0%"></div>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3 pt-2">
                        <div class="bg-gray-50 p-3 rounded-xl border border-gray-100 text-center">
                            <div class="text-xs text-gray-400 font-medium">累計完了</div>
                            <div id="stat-completed" class="text-xl font-bold text-gray-800 mt-1">0</div>
                        </div>
                        <div class="bg-gray-50 p-3 rounded-xl border border-gray-100 text-center">
                            <div class="text-xs text-gray-400 font-medium">ポモドーロ</div>
                            <div id="stat-pomodoros" class="text-xl font-bold text-gray-800 mt-1">0</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 flex flex-col h-[calc(100vh-120px)] min-h-[650px] w-full min-w-0">
            <div class="flex flex-wrap justify-between items-center gap-2 mb-4">
                <h3 class="font-bold text-gray-900 flex items-center gap-2">
                    <i class="fa-solid fa-list-check text-indigo-500"></i> TODOリスト
                </h3>
                <div class="flex items-center gap-1 bg-gray-100 p-1 rounded-lg text-[11px] shrink-0">
                    <button id="sort-date" class="px-2 py-1 rounded bg-white text-indigo-600 font-medium shadow-sm transition">日付順</button>
                    <button id="sort-name" class="px-2 py-1 rounded text-gray-500 hover:text-gray-700 transition">名前順</button>
                    <button id="sort-cost" class="px-2 py-1 rounded text-gray-500 hover:text-gray-700 transition">コスト順</button>
                </div>
            </div>

            <form id="todo-form" class="space-y-3 mb-4">
                <input type="text" id="todo-input" placeholder="タスクのタイトルを入力..." required class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                <textarea id="todo-memo" placeholder="メモ・詳細を追加（省略可）..." rows="2" class="w-full px-4 py-2 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-xs resize-none"></textarea>

                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-[10px] text-gray-400 font-medium mb-0.5">開始日</label>
                        <input type="date" id="todo-date" required class="w-full text-xs border border-gray-200 p-2 rounded-xl text-gray-600 focus:outline-none focus:ring-1 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label class="block text-[10px] text-gray-400 font-medium mb-0.5">終了日</label>
                        <input type="date" id="todo-end-date" required class="w-full text-xs border border-gray-200 p-2 rounded-xl text-gray-600 focus:outline-none focus:ring-1 focus:ring-indigo-500">
                    </div>
                </div>
                <div class="flex gap-2 items-center justify-between pt-1">
                    <div class="flex items-center gap-1.5">
                        <div class="flex gap-0.5" id="cost-selector">
                            <button type="button" data-cost="1" class="cost-star text-amber-400 text-sm"><i class="fa-solid fa-star"></i></button>
                            <button type="button" data-cost="2" class="cost-star text-gray-300 text-sm"><i class="fa-solid fa-star"></i></button>
                            <button type="button" data-cost="3" class="cost-star text-gray-300 text-sm"><i class="fa-solid fa-star"></i></button>
                            <button type="button" data-cost="4" class="cost-star text-gray-300 text-sm"><i class="fa-solid fa-star"></i></button>
                            <button type="button" data-cost="5" class="cost-star text-gray-300 text-sm"><i class="fa-solid fa-star"></i></button>
                        </div>
                    </div>
                    <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-semibold px-5 py-2.5 rounded-xl transition shadow-sm">タスクを追加</button>
                </div>
            </form>

            <div id="todo-list" class="flex-1 overflow-y-auto space-y-2 pr-1 w-full min-w-0">
                <p class="text-center text-gray-400 text-xs py-8">タスクがありません</p>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-4 lg:p-6 flex flex-col h-[calc(100vh-120px)] min-h-[650px]">
            <h3 class="font-bold text-gray-900 mb-3 flex items-center gap-2">
                <i class="fa-regular fa-calendar-days text-emerald-500"></i> カレンダー
            </h3>
            <div id="calendar" class="text-xs flex-1"></div>
        </div>
    </main>

    <div id="edit-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl p-6 max-w-md w-full shadow-xl space-y-4">
            <h4 class="text-base font-bold text-gray-900 flex items-center gap-2">
                <i class="fa-solid fa-pen-to-square text-indigo-500"></i> タスクの編集
            </h4>
            <div class="space-y-3">
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1">タイトル</label>
                    <input type="text" id="edit-input" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1">メモ</label>
                    <textarea id="edit-memo" rows="3" class="w-full px-3 py-2 border border-gray-200 rounded-xl text-xs focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none"></textarea>
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1">コスト (重要度・作業量)</label>
                    <div class="flex gap-1" id="edit-cost-selector">
                        <button type="button" data-cost="1" class="edit-cost-star text-gray-300 text-base"><i class="fa-solid fa-star"></i></button>
                        <button type="button" data-cost="2" class="edit-cost-star text-gray-300 text-base"><i class="fa-solid fa-star"></i></button>
                        <button type="button" data-cost="3" class="edit-cost-star text-gray-300 text-base"><i class="fa-solid fa-star"></i></button>
                        <button type="button" data-cost="4" class="edit-cost-star text-gray-300 text-base"><i class="fa-solid fa-star"></i></button>
                        <button type="button" data-cost="5" class="edit-cost-star text-gray-300 text-base"><i class="fa-solid fa-star"></i></button>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1">開始日</label>
                        <input type="date" id="edit-date" class="w-full text-xs border border-gray-200 p-2 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1">終了日</label>
                        <input type="date" id="edit-end-date" class="w-full text-xs border border-gray-200 p-2 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                </div>
            </div>
            <div class="flex justify-end gap-2 pt-2">
                <button id="btn-edit-cancel" class="px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-500 text-xs font-medium rounded-xl transition">キャンセル</button>
                <button id="btn-edit-save" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-medium rounded-xl transition shadow-sm">変更を保存</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.
